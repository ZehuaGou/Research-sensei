# Copy this file to config/local.toml for machine-local provider overrides.
# Keep secrets in .env, not in TOML and never in git.
# Runtime precedence is:
#   explicit create_app/constructor value
#   > environment variable
#   > config/local.toml
#   > this example file
#   > code default
# create_app loads the merged configuration once and injects it into services.
#
# Typical .env for direct OpenCode Go runs:
# RESEARCHSENSEI_ENABLE_API_LLM=1
# RESEARCHSENSEI_LLM_PROVIDER=opencode_go
# OPENCODE_GO_API_KEY=...
# UNPAYWALL_EMAIL=you@example.com
# RESEARCHSENSEI_CONTACT_EMAIL=you@example.com
# SEMANTIC_SCHOLAR_API_KEY=...
# S2_API_KEY=...  # optional alias for SEMANTIC_SCHOLAR_API_KEY
# OPENAI_COMPATIBLE_API_KEY=...

active_provider = "opencode_go"

[providers.deepseek]
kind = "openai_compatible"
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
model = "deepseek-chat"
timeout_seconds = 60

[providers.mimo]
kind = "openai_compatible"
base_url = "https://api.xiaomimimo.com/v1"
api_key_env = "MIMO_API_KEY"
model = "mimo-v2.5-pro"
auth_header = "api-key"
timeout_seconds = 60

[providers.opencode_go]
kind = "openai_compatible"
base_url = "https://opencode.ai/zen/go/v1"
api_key_env = "OPENCODE_GO_API_KEY"
model = "deepseek-v4-flash"
timeout_seconds = 120

[providers.cc_switch]
kind = "anthropic_compatible"
base_url = "http://127.0.0.1:15721/v1"
api_key_env = ""
model = "claude-sonnet-4-6"
auth_header = "none"
timeout_seconds = 120

[providers.openai_compatible]
kind = "openai_compatible"
base_url = "https://api.example.com/v1"
api_key_env = "OPENAI_COMPATIBLE_API_KEY"
model = "example-model"
timeout_seconds = 60

[providers.custom]
kind = "openai_compatible"
base_url = "https://your-openai-compatible-endpoint.example/v1"
api_key_env = "OPENAI_COMPATIBLE_API_KEY"
model = "your-model-name"
auth_header = "authorization"
timeout_seconds = 60

[app]
workspace_dir = "workspace"
default_learning_mode = "reproducible_2h"
max_upload_mb = 80
# Lightweight deterministic importer for Markdown/text and explicit no-agent
# workflows. Configured PDF deep reads use the OpenCode paper agent instead.
parser_backend = "pymupdf"

[server]
host = "127.0.0.1"
port = 8765
reload = false

[opencode]
# OpenCode Server is a separate paper-agent path. It accepts rendered PDF
# pages, preserves one persistent session per paper, and lets paper tutor continue the
# same conversation. Enable it on machines with the `opencode` CLI installed.
enabled = false
base_url = "http://127.0.0.1:4096"
auto_start = true
command = "opencode"
provider_id = "opencode-go"
# Select an attachment-capable model. DeepSeek V4 Flash is text-only in the
# current OpenCode Go catalogue, so it cannot inspect PDF page images.
model = "qwen3.7-plus"
tutor_model = "mimo-v2.5"
timeout_seconds = 600
startup_timeout_seconds = 20
page_batch_size = 4
max_pages = 120
render_scale = 1.7

[search]
# Every field below is consumed by PaperSearchMcpAdapter through the canonical
# SearchConfig. Unknown sources, empty commands, negative timeouts, and unsafe
# result limits are rejected during startup rather than silently ignored.
execution = "auto"
command = "paper-search"
sources = ["openalex", "semantic", "crossref", "dblp", "arxiv", "core"]
max_results = 80
timeout_seconds = 90
min_citation_count = 0
# 0 downloads every strict-relevance candidate. Set a positive number only
# when you explicitly want a storage/network safety cap.
max_download_candidates = 0
# Optional, explicit user-authorized native-Chrome fallback for any publisher
# page that rejects backend HTTP requests. Create this state with the command
# documented in docs/development/LITERATURE_DISCOVERY.md. Never commit it.
browser_download_enabled = false
browser_session_state = "workspace/browser-session.json"
browser_headless = false
