# 10_TASK_QUEUE.yaml
# 给 Agent 顺序执行的任务队列。执行前必须读取 07_NIGHT_RUN_PLAYBOOK.md。

queue:
  - id: phase_0
    name: docs_and_reuse
    tasks:
      - task_0_1_create_docs
      - task_0_2_reuse_report
      - task_0_3_dependency_decision
    stop_after_phase: false

  - id: phase_1
    name: project_foundation
    tasks:
      - task_1_1_create_structure
      - task_1_2_config_logging
      - task_1_3_basic_cli
    stop_after_phase: false

  - id: phase_2
    name: schemas_and_fixtures
    tasks:
      - task_2_1_common_schema
      - task_2_2_paper_schema
      - task_2_3_card_schema
      - task_2_4_sample_fixtures
    stop_after_phase: false

  - id: phase_3
    name: llm_and_prompt_base
    tasks:
      - task_3_1_llm_client_mock
      - task_3_2_prompt_builder
      - task_3_3_token_budget
      - task_3_4_response_cache
    stop_after_phase: false

  - id: phase_4
    name: single_paper_ingestion
    tasks:
      - task_4_1_local_source_resolver
      - task_4_2_markdown_txt_ingestion
      - task_4_3_pdf_fallback
      - task_4_4_block_index
    stop_after_phase: true

  - id: phase_5
    name: grounding_and_skeleton
    tasks:
      - task_5_1_basic_grounding
      - task_5_2_skeleton_generator
      - task_5_3_evidence_checker
    requires_human_review: true

  - id: phase_6
    name: learning_cards
    tasks:
      - task_6_1_paper_card
      - task_6_2_formula_card
      - task_6_3_concept_card
      - task_6_4_pattern_card
      - task_6_5_drill_card
    requires_human_review: true

  - id: phase_7
    name: render_html
    tasks:
      - task_7_1_jinja_templates
      - task_7_2_responsive_layout
      - task_7_3_fastapi_routes

  - id: phase_8
    name: interactive_context
    tasks:
      - task_8_1_context_pack
      - task_8_2_interactive_answer
      - task_8_3_memory_store
      - task_8_4_advisor_state_machine
    requires_human_review: true

  - id: phase_9
    name: direction_learning
    tasks:
      - task_9_1_query_planner
      - task_9_2_search_adapters
      - task_9_3_selection_scoring
    requires_human_review: true

  - id: phase_10
    name: direction_map
    tasks:
      - task_10_1_direction_map_generator
      - task_10_2_direction_map_html
    requires_human_review: true

  - id: phase_11
    name: review_and_user_model
    tasks:
      - task_11_1_feedback_api
      - task_11_2_error_attribution
      - task_11_3_review_scheduler

  - id: phase_12
    name: reliability
    tasks:
      - task_12_1_pipeline_resume
      - task_12_2_logging_cost_stats
      - task_12_3_cache_invalidation
      - task_12_4_security_tests

  - id: phase_13
    name: real_samples_and_eval
    tasks:
      - task_13_1_sample_paper_set
      - task_13_2_golden_outputs
      - task_13_3_eval_report
    requires_human_review: true

  - id: phase_14
    name: package_and_deploy
    tasks:
      - task_14_1_start_scripts
      - task_14_2_cli_docs
      - task_14_3_deployment_docs
